<html lang="en">
<head>

</head>

        </svg>
      </span>
      <span class="logo-text">Oscars</span>
    </div>
    <div class="header-controls">
      <label>
        Year
        <select id="yearSelect"><option value="">All years</option></select>
      </label>
      <label>
        Category
        <select id="categorySelect">
          <option value="">Best Picture</option>
        </select>
      </label>
      <label class="search-label">
        Search
        <input id="searchInput" type="search" placeholder="film title, person, or category" />
      </label>
      <label class="toggle header-toggle">
        <input id="winnersOnly" type="checkbox" checked />
        <span>Only winners</span>
      </label>
    </div>
    <span class="sr-only">Browse the nominees with a single search and filter interface.</span>
  </div>


  <section class="stats">
    <span id="statYears"></span>
    <span id="statFilms"></span>
    <span id="statCategories"></span>
  </section>

  <section id="suggestedMovieSection">
    <div id="suggestedMovie"></div>
  </section>

  <main>
    <div id="filmList" class="film-grid"></div>
  </main>

  <div id="filmModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-body">
      <button id="filmModalClose" class="close" aria-label="Close modal">×</button>
      <div class="film-modal-inner">
        <div id="filmModalThumb" class="film-modal-thumb hidden" aria-hidden="true"></div>
        <div class="film-modal-copy">
          <h2 id="filmModalTitle"></h2>
          <p id="filmModalSubline" class="film-modal-subline"></p>
          <p id="filmModalSummary" class="film-modal-summary"></p>
          <div class="film-modal-meta">
            <span id="filmModalProduction"></span>
            <span id="filmModalDistributor"></span>
          </div>
        </div>
        <section class="film-modal-nomination-list">
          <h3>Nominations</h3>
          <ul id="filmModalNominations" class="film-modal-nominations"></ul>
        </section>
      </div>
    </div>
  </div>

  <div id="loading" class="loading hidden">Loading…</div>
  <script src="app.js" type="module"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Oscars Explorer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="roof">
    <h1>Oscars Explorer</h1>
    <p>Browse the nominees with a single search and filter interface.</p>
  </div>

  <section class="filters">
    <label>
      Year
      <select id="yearSelect"><option value="">All years</option></select>
    </label>
    <label>
      Category
      <select id="categorySelect">
        <option value="">Best Picture</option>
      </select>
    </label>
    <label>
      Search
      <input id="searchInput" type="search" placeholder="film title, person, or category" />
    </label>
    <label class="toggle">
      <input id="winnersOnly" type="checkbox" checked />
      <span>Only winners</span>
    </label>
  </section>

  <section class="stats">
    <span id="statYears"></span>
    <span id="statFilms"></span>
    <span id="statCategories"></span>
  </section>

  <main>
    <div id="filmList" class="film-grid"></div>
  </main>

  <div id="actorModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-body">
      <button id="modalClose" class="close">×</button>
      <h2 id="actorModalTitle"></h2>
      <p id="modalSummary"></p>
      <a id="modalLink" href="#" target="_blank" rel="noreferrer">Read more</a>
    </div>
  </div>

  <div id="loading" class="loading hidden">Loading…</div>
  <script src="app.js" type="module"></script>
</body>
</html>
